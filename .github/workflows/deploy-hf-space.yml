name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hf-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hugging Face Hub client
        run: python -m pip install --upgrade huggingface_hub

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO_ID: Ishangtxl/mainframe-modernization-openenv
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          repo_id = os.environ["HF_SPACE_REPO_ID"]
          token = os.environ["HF_TOKEN"]
          sha = os.environ["GITHUB_SHA"][:7]

          api = HfApi(token=token)
          api.create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              private=False,
              exist_ok=True,
          )
          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              commit_message=f"Sync from GitHub {sha}",
              ignore_patterns=[
                  ".git/**",
                  ".github/**",
                  ".venv/**",
                  "__pycache__/**",
                  ".pytest_cache/**",
                  "*.pyc",
                  "*.egg-info/**",
                  ".DS_Store",
              ],
          )
          print(f"Uploaded {sha} to https://huggingface.co/spaces/{repo_id}")
          PY
